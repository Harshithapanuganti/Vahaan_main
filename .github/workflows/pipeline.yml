name: Vahan Pipeline

on:
  schedule:
    - cron: "30 21 */15 * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # ✅ ADD THIS (MANDATORY)
      - name: Install Playwright browsers
        run: |
          playwright install --with-deps

      # ✅ Run scraper
      - name: Run pipeline
        run: |
          python run_pipeline.py

      # ✅ Merge output
      - name: Merge data
        run: |
          python merge_data.py

      # ✅ Debug
      - name: Check files
        run: |
          ls -R

      # ✅ Upload
      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: vahan-output
          path: final_merged_data.csv
