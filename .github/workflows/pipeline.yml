name: Vahan Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "30 21 */15 * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Install Playwright
        run: |
          playwright install --with-deps

      # ✅ TEMP TEST RUN (important)
      - name: Run scraper test
        run: |
          python scraper.py --yaxis "Vehicle Category" --xaxis "Fuel" --state "Kerala" --year 2023

      - name: Merge data
        run: |
          python merge_data.py

      - name: Debug output
        run: |
          echo "Files in repo:"
          ls -R

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: vahan-output
          path: final_merged_data.csv
