name: Vahan Pipeline

on:
  schedule:
    - cron: "30 21 */15 * *"   # ✅ runs every 15 days (3 AM IST)
  workflow_dispatch:           # ✅ manual run option

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Checkout your repository
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ✅ Step 3: Install dependencies
      - name: Install requirements
        run: |
          pip install -r requirements.txt

      # ✅ Step 4: Create output folder (safe)
      - name: Create output folder
        run: |
          mkdir -p output

      # ✅ Step 5: Run your script directly
      - name: Run merge script
        run: |
          python merge_data.py

      # ✅ Step 6: Verify files (debug, useful)
      - name: Check generated files
        run: |
          ls -R

      # ✅ Step 7: Upload CSV output
      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: vahan-output
          path: final_merged_data.csv
