name: Vahan Pipeline

on:
  schedule:
    - cron: "30 21 */15 * *"   # ✅ Runs every 15 days (3:00 AM IST)
  workflow_dispatch:           # ✅ Manual run option

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ✅ Step 1: Checkout your repository
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ✅ Step 3: Install dependencies
      - name: Install requirements
        run: |
          pip install -r requirements.txt

      # ✅ Step 4: Run FULL pipeline (IMPORTANT ✅)
      # This should generate CSV files in vahan_data/
      - name: Run pipeline (scraper + processing)
        run: |
          python run_pipeline.py

      # ✅ Step 5: Run merge step (FINAL OUTPUT ✅)
      - name: Run merge
        run: |
          python merge_data.py

      # ✅ Step 6: Debug (optional but helpful ✅)
      - name: Check files
        run: |
          ls -R

      # ✅ Step 7: Upload final CSV
      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: vahan-output
          path: final_merged_data.csv
