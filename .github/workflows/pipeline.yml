name: Vahan Pipeline

on:
  schedule:
    - cron: "30 21 */15 * *"   # runs every 15 days at 3 AM IST
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # ✅ Get your repo
      - name: Checkout code
        uses: actions/checkout@v3

      # ✅ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ✅ Install dependencies
      - name: Install requirements
        run: |
          pip install -r requirements.txt

      # ✅ Run your pipeline
      - name: Run pipeline
        run: |
          python run_pipeline.py   # ✅ THIS IS IMPORTANT

      # ✅ Store CSV output
      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: vahan-output
          path: "*.csv"
